<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#0b1020" />
  <link rel="manifest" href="manifest.json" />
  <title>運転英会話</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main>
    <div id="timer">00:00</div>
    <div id="orb"></div>
    <div id="status">「はじめる」を押してください</div>

    <select id="micSelect" class="mic-select" title="使うマイク"></select>
    <button id="testMicBtn" class="test-mic">🎤 マイクをテスト</button>
    <div id="levelWrap"><div id="levelBar"></div></div>
    <div id="levelHint">「マイクをテスト」を押して話す → 緑のバーが動けばそのマイクは生きてる</div>

    <div class="buttons">
      <button id="startBtn">▶ はじめる</button>
      <button id="stopBtn" disabled>■ おわる</button>
    </div>

    <details id="logWrap">
      <summary>会話ログ（運転後の振り返り用）</summary>
      <div id="log"></div>
    </details>
  </main>
  <script src="app.js"></script>
</body>
</html>
