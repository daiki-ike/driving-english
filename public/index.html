<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#0b1020" />
  <link rel="manifest" href="manifest.json" />
  <title>運転英会話</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Hiragino Sans", "Noto Sans JP", system-ui, sans-serif;
      background: radial-gradient(circle at 50% 30%, #16203c, #0b1020 70%);
      color: #eef2ff; min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      -webkit-user-select: none; user-select: none;
    }
    main { width: 100%; max-width: 520px; padding: 24px; text-align: center; }
    #timer { font-size: 22px; font-variant-numeric: tabular-nums; letter-spacing: 2px; color: #8fa0c8; margin-bottom: 24px; }
    #orb {
      width: 180px; height: 180px; margin: 0 auto 28px; border-radius: 50%;
      background: radial-gradient(circle at 35% 30%, #4f7cff, #233a8e 60%, #16204a);
      box-shadow: 0 0 60px rgba(79, 124, 255, 0.35); transition: transform 0.3s ease;
    }
    #orb.live { animation: breathe 2.4s ease-in-out infinite; box-shadow: 0 0 90px rgba(79, 124, 255, 0.6); }
    @keyframes breathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.08); } }
    #status { font-size: 18px; min-height: 28px; margin-bottom: 36px; color: #cdd6f4; }
    .mic-select {
      width: 100%; max-width: 360px; padding: 10px 12px; margin: 0 auto 12px; display: block;
      border-radius: 10px; border: 1px solid #2b3a66; background: #131c38; color: #cdd6f4; font-size: 14px;
    }
    .test-mic {
      display: block; margin: 0 auto 12px; padding: 10px 18px; font-size: 15px; font-weight: 700;
      border: 1px solid #3a4a7a; border-radius: 10px; background: #1c2747; color: #cdd6f4; cursor: pointer;
    }
    .test-mic.active { background: #2f7d4f; border-color: #2f7d4f; }
    #levelWrap { width: 100%; max-width: 360px; height: 14px; margin: 0 auto 6px; background: #131c38; border-radius: 8px; overflow: hidden; }
    #levelBar { height: 100%; width: 0%; background: linear-gradient(90deg, #2f7d4f, #5fd38a); transition: width 0.06s linear; }
    #levelHint { font-size: 12px; color: #8fa0c8; margin-bottom: 28px; }
    .buttons { display: flex; gap: 16px; justify-content: center; }
    button { flex: 1; max-width: 200px; padding: 22px 16px; font-size: 22px; font-weight: 700; border: none; border-radius: 18px; color: #fff; cursor: pointer; }
    #startBtn { background: #2f7d4f; }
    #stopBtn { background: #8e3b3b; }
    button:disabled { opacity: 0.4; }
    #logWrap { margin-top: 40px; text-align: left; color: #9aa6c8; font-size: 14px; }
    #logWrap summary { cursor: pointer; padding: 8px 0; }
    #log { max-height: 40vh; overflow-y: auto; margin-top: 8px; }
    .row { padding: 6px 0; line-height: 1.6; }
    .row .who { display: inline-block; min-width: 56px; font-weight: 700; font-size: 12px; }
    .row.you .who { color: #7fd1a0; }
    .row.ai .who { color: #7fa0ff; }
  </style>
</head>
<body>
  <main>
    <div id="timer">00:00</div>
    <div id="orb"></div>
    <div id="status">「はじめる」を押してください</div>

    <select id="micSelect" class="mic-select" title="使うマイク"></select>
    <button id="testMicBtn" class="test-mic">🎤 マイクをテスト</button>
    <div id="levelWrap"><div id="levelBar"></div></div>
    <div id="levelHint">「マイクをテスト」を押して話す → 緑のバーが動けばそのマイクは生きてる</div>

    <div class="buttons">
      <button id="startBtn">▶ はじめる</button>
      <button id="stopBtn" disabled>■ おわる</button>
    </div>

    <details id="logWrap">
      <summary>会話ログ（運転後の振り返り用）</summary>
      <div id="log"></div>
    </details>
  </main>
  <script src="app.js"></script>
</body>
</html>
